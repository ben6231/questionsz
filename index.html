<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Une petite question…</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ====== TU PEUX TOUT PERSONNALISER ICI ====== */
  :root{
    --bg1:#fff1f4;
    --bg2:#ffd9e2;
    --rose:#ff4d6d;
    --rose-fonce:#e23457;
    --texte:#3a2730;
    --blanc:#ffffff;
  }

  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    font-family:"Fredoka",system-ui,sans-serif;
    color:var(--texte);
    background:radial-gradient(120% 120% at 50% 0%, var(--bg1) 0%, var(--bg2) 100%);
    display:flex;align-items:center;justify-content:center;
    min-height:100dvh;overflow:hidden;text-align:center;
    -webkit-tap-highlight-color:transparent;
  }

  .scene{position:relative;width:100%;height:100dvh;display:flex;
    flex-direction:column;align-items:center;justify-content:center;
    padding:24px;gap:28px}

  .question{
    font-size:clamp(28px,7vw,64px);
    font-weight:700;line-height:1.1;margin:0;max-width:14ch;
    text-shadow:0 2px 0 rgba(255,255,255,.6);
  }
  .sous-titre{font-size:clamp(15px,3.5vw,20px);font-weight:400;opacity:.7;margin:0}

  .boutons{display:flex;gap:18px;align-items:center;flex-wrap:wrap;justify-content:center}

  button{
    font-family:inherit;font-weight:600;cursor:pointer;border:none;
    border-radius:999px;transition:transform .18s ease, box-shadow .18s ease;
    user-select:none;
  }
  .oui{
    background:var(--rose);color:var(--blanc);
    font-size:clamp(18px,4.5vw,24px);
    padding:16px 40px;
    box-shadow:0 10px 24px rgba(255,77,109,.45);
  }
  .oui:hover{transform:scale(1.04)}
  .oui:active{transform:scale(.97)}

  .non{
    background:var(--blanc);color:var(--rose-fonce);
    font-size:clamp(16px,4vw,20px);
    padding:14px 32px;
    border:2px solid #ffc2cf;
    box-shadow:0 6px 14px rgba(0,0,0,.06);
    position:relative;
  }
  /* quand le "non" se balade, il devient absolu */
  .non.fuit{position:fixed;z-index:5;margin:0}

  .coeurs{position:fixed;inset:0;pointer-events:none;overflow:hidden}
  .coeur{position:absolute;bottom:-40px;font-size:28px;animation:monte linear forwards}
  @keyframes monte{
    to{transform:translateY(-110dvh) rotate(360deg);opacity:0}
  }

  @media (prefers-reduced-motion: reduce){
    button{transition:none}
    .coeur{animation:none;display:none}
  }
</style>
</head>
<body>
  <div class="scene">
    <!-- ====== CHANGE LE TEXTE ICI ====== -->
    <p class="question" id="question">Would you still hangout with me tonight and maybe more ? </p>
    <p class="sous-titre" id="sous-titre">(réfléchis bien…)</p>

    <div class="boutons" id="boutons">
      <button class="oui" id="oui">Oui </button>
      <button class="non" id="non">Non</button>
    </div>
  </div>

  <div class="coeurs" id="coeurs"></div>

<script>
  const oui = document.getElementById('oui');
  const non = document.getElementById('non');
  const question = document.getElementById('question');
  const sousTitre = document.getElementById('sous-titre');
  const boutons = document.getElementById('boutons');

  let tailleOui = 1;            // grossit à chaque esquive
  let tailleNon = 1;            // rétrécit à chaque esquive
  const phrases = [             // petits messages qui changent
    "Non", "Sûr ?","Meme pas un peu ?" ,  "Vraiment ?", "Réfléchis…",
    "Allez quoi", "Dernière chance", , "Bon ok non non"
  ];
  let i = 0;

  function fuir(){
    // le "non" se détache et saute à une position aléatoire à l'écran
    if(!non.classList.contains('fuit')){
      const r = non.getBoundingClientRect();
      non.style.width = r.width + 'px';
      non.style.height = r.height + 'px';
      non.classList.add('fuit');
    }
    const marge = 20;
    const maxX = window.innerWidth  - non.offsetWidth  - marge;
    const maxY = window.innerHeight - non.offsetHeight - marge;
    const x = Math.max(marge, Math.random()*maxX);
    const y = Math.max(marge, Math.random()*maxY);
    non.style.left = x + 'px';
    non.style.top  = y + 'px';

    // le oui grossit, le non rétrécit
    tailleOui = Math.min(tailleOui + 0.18, 100);
    tailleNon = Math.max(tailleNon - 0.08, 0.5);
    oui.style.transform = 'scale(' + tailleOui + ')';
    non.style.transform = 'scale(' + tailleNon + ')';

    // change le texte du bouton
    i = (i + 1) % phrases.length;
    non.textContent = phrases[i];
  }

  // desktop : survol  |  mobile : on intercepte le toucher avant le clic
  non.addEventListener('mouseover', fuir);
  non.addEventListener('pointerdown', function(e){ e.preventDefault(); fuir(); });
  non.addEventListener('touchstart', function(e){ e.preventDefault(); fuir(); }, {passive:false});

  // clic sur OUI = victoire
  oui.addEventListener('click', function(){
    question.textContent = "Nice, let's have some fuuunnnnnn";
    sousTitre.textContent = "Jamais douté de toi";
    non.style.display = 'none';
    oui.textContent = "❤️";
    pluieDeCoeurs();
  });

  function pluieDeCoeurs(){
    const conteneur = document.getElementById('coeurs');
    const emojis = ['💖','💕','💗','💘','❤️','🥰'];
    for(let k=0;k<60;k++){
      const c = document.createElement('div');
      c.className = 'coeur';
      c.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      c.style.left = Math.random()*100 + 'vw';
      c.style.fontSize = (20 + Math.random()*30) + 'px';
      c.style.animationDuration = (3 + Math.random()*3) + 's';
      c.style.animationDelay = (Math.random()*1.5) + 's';
      conteneur.appendChild(c);
    }
  }
</script>
</body>
</html>
